name: Playwright Tests

# Run on every pull request targeting main, and on pushes to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: pytest + Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        # --with-deps also installs the OS libraries the browsers need.
        run: playwright install --with-deps chromium

      - name: Run tests
        run: pytest

      - name: Upload test report and traces
        # Keep artifacts even when tests fail, so you can debug from the PR.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            report.html
            test-results/
          retention-days: 14
