[pytest]
# Where pytest looks for tests
testpaths = tests features

# Files/classes/functions pytest treats as tests
python_files = *.py
python_classes = Test*
python_functions = test_*

# Default command-line options applied to every run:
#   --headed        run with a visible browser (drop it for headless/CI)
#   --browser       which browser engine to use
#   --html          generate an HTML report
#   --tracing       record a Playwright trace.zip (off by default)
#                   values: on | off | retain-on-failure | on-first-retry
#                   -> TOGGLE: uncomment the line below to turn tracing on
addopts =
    --browser chromium
    --html=report.html
    --self-contained-html
#    --tracing on
    --tracing retain-on-failure

# Base URL for the site under test. The pytest-base-url plugin (installed via
# pytest-playwright) reads this and exposes it through the built-in `base_url`
# fixture — so tests can request `base_url` without any code in conftest.py.
# Override per-run with:  pytest --base-url https://staging.example.com
base_url = https://source.thenbs.com

markers =
    smoke: quick sanity checks
    search: search-related tests
